[build]
  command = "cd api && npx prisma generate && cd .. && mkdir -p generated && cp -r api/generated/client generated/ && pnpm run build"
  publish = "dist"

[functions]
  included_files = ["generated/client/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "11"
