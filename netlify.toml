[build]
  command = "cd api && npx prisma generate && cp -r node_modules/.prisma ../node_modules/ && cd .. && pnpm run build"
  publish = "dist"

[functions]
  external_node_modules = ["@prisma/client", "prisma"]
  included_files = ["api/node_modules/.prisma/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
