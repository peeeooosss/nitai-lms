[build]
  command = "cd api && npx prisma generate && cd .. && pnpm run build"
  publish = "dist"

[functions]
  included_files = ["api/generated/client/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "11"
